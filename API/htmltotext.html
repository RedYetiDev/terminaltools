<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Terminal Tools | API | Webpage Text</title>
  </head>
  <body>
    <div id="webpage">

    </div>
    <script type="text/javascript">
    window.onload = async function() {
      var { searchParams } = new URL(location.href)
      var url = searchParams.get("url")
      if (url) {
        var webdata;
        await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
                    .then(response => {
                      if (response.ok) return response.json()
                      throw new Error('Network response was not ok.')
                    })
                    .then(data => {webdata = data.contents});
        webdata = webdata.split("<body")[1].split("</body>")[0].split(">")
        delete webdata[0]
        webdata = webdata.join(">").substring(1)
        console.log(webdata)
        var webpage = document.getElementById("webpage")
        webpage.innerHTML = webdata.replace("<br>","\n")
        webpage.innerText = webpage.innerText

      } else {
        document.body.innerHTML = "Error! Please Provide a valid URL"
      }
    }
    </script>
  </body>
</html>
